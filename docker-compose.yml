services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: admin-auth-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
      POSTGRES_DB: admin_auth
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/init-pgvector.sql:/docker-entrypoint-initdb.d/init-pgvector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d admin_auth"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
